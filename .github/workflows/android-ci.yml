name: Android CI - CakeLab Mobile

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    name: Build and Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Compilar proyecto CakeLab
        run: ./gradlew build

      - name: Ejecutar pruebas automáticas
        run: ./gradlew test